default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>

development:
  <<: *default
  database: candidate_onboarding_development

test:
  <<: *default
  database: candidate_onboarding_test

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *primary_production
    database: candidate_onboarding_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: candidate_onboarding_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: candidate_onboarding_production_cable
    migrations_paths: db/cable_migrate
