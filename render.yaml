services:
  - type: web
    name: candidate-onboarding
    runtime: ruby
    buildCommand: "./bin/render-build.sh"
    startCommand: "bin/rails server -b 0.0.0.0 -p $PORT"
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: candidate-onboarding-db
          property: connectionString

databases:
  - name: candidate-onboarding-db
    databaseName: candidate_onboarding
    user: candidate_onboarding
    plan: free
